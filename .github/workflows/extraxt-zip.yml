name: Extract Resources ZIP

on:
  push:
    paths:
      - 'app/src/main/res/res.zip'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract ZIP and commit
        run: |
          cd app/src/main/res
          unzip -o res.zip
          rm res.zip
          cd ../../..

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/res/
          git commit -m "chore: extract resource files from ZIP" || echo "No changes to commit"
          git push
